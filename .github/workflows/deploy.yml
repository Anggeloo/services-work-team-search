name: CI/CD to EC2

on:
  push:
    branches:
      - QA
  pull_request:
    branches:
      - QA

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/work-team-search:latest .
          docker tag ${{ secrets.DOCKER_USERNAME }}/work-team-search:latest ${{ secrets.DOCKER_USERNAME }}/work-team-search:${{ github.sha }}

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/work-team-search:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/work-team-search:${{ github.sha }}

  deploy-to-ec2:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            # 1) Navigate to the directory where docker-compose.yml is located
            cd /home/ubuntu/
            
            # 2) Create or update .env file with values from GitHub Secrets
            echo "DB_HOST=${{ secrets.DB_HOST }}" > .env
            echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
            echo "DB_USER=${{ secrets.DB_USER }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
            echo "PORT=${{ secrets.PORT }}" >> .env
            
            # 3) Verify the .env file content
            cat .env
            
            # 4) Pull the latest image from Docker Hub
            docker pull ${{ secrets.DOCKER_USERNAME }}/work-team-search:latest
            
            # 5) Stop and remove previous containers
            docker-compose down
            
            # 6) Start new containers with the updated image
            docker-compose up -d --remove-orphans

